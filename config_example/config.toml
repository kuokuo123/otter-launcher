# Terminal shell script launcher, written in rust
# Source Code: https://github.com/kuokuo123/otter-launcher

# Recommended to be used in companion with fsel or sway-launcher-desktop to launch desktop applications


[general]
# module to run when no prefix is matched
default_module = "gg"
# run with an empty prompt
empty_module = "app"
# exec command of your shell, eg. "zsh -c" for zsh; accept wm commands like "hyprctl dispatch exec"
exec_cmd = "sh -c"
# set true to use vi keybinds, false emacs keybinds
vi_mode = false
esc_to_abort = true
# when prompted, will show a list of configured modules
cheatsheet_entry = "?"
# command to show cheatsheet; through piping stdout
cheatsheet_viewer = "less -R; clear"
clear_screen_after_execution = false
# don't quit after executing a module, useful with scratchpads; stderr is hidden in loop mode
loop_mode = false
# if set, press ctrl+x ctrl+ee (or v in vi normal mode) to edit prompt in the specified program
external_editor = "vi"
# sometimes the otter runs too fast even before the terminal window is ready; this slows it down by milliseconds; useful when chafa image is skewed
delay_startup = 30
# if set, will run after module execution; for example, calling swaymsg to adjust window size
callback = ""


# ANSI color codes are allowed. However, \x1b should be replaced with \u001B, because the rust toml crate cannot read \x as an escaped character
[interface]
# use three quotes to write longer codes
header = """
 \u001B[34;1mÔćĚ  \u001B[0m$USER@$(printf $HOSTNAME)\u001B[0m$(printf '\u001B[999C\u001B[14D')\u001B[31mÔąě\u001B[0m $(mpstat | awk 'FNR ==4 {print $4}') \u001B[33můįćõ\u001B[0m $(free -h | awk 'FNR == 2 {print $3}' | sed 's/i//')
    """
# run a command and print stdout above the header
header_cmd = ""
# remove trailing lines from header_cmd output, lest programs appending excessive lines
header_cmd_trimmed_lines = 0
# texts to show at the input field
place_holder = "type & search"
# available options: list, hint
suggestion_mode = "list"
# add a line between intput field and suggestion list; only effective in list mode
separator = """
$( \
    text="    modules"; \
    printf "\u001B[0;90m$text \
    $(printf -v line '%*s' \"$(( COLUMNS - $(printf "$text" | wc -m) - 3 ))\" ''; printf '%s' \"${line// /‚ĒÄ}\")" \
)"""
# add a line after suggestion list
footer = ""
# 0 to disable suggestions and tab completion
suggestion_lines = 4
list_prefix = "    "
selection_prefix = "  \u001B[31;1m‚ĖĆ "
# format prefixes to have a uniformed width
prefix_padding = 3
# shown when the default module is in use
default_module_message = "    \u001B[33msearch\u001B[0m the internet"
# shown when the empty module is in use
empty_module_message = ""
# false to list suggestions/hints alphabetically; true to list them as per the configured order in the below [[modules]] section
customized_list_order = false
# the sign showing whether a module should run with an argument
indicator_with_arg_module = ""
indicator_no_arg_module = ""
# below color options affect all modules; per-module coloring can be configured using ansi codes individually
prefix_color = "\u001B[33m"
description_color = "\u001B[39m"
place_holder_color = "\u001B[30m"
# suggestion color in hint mode
hint_color = "\u001B[30m"
# move the interface rightward or downward
move_interface_right = 0
move_interface_down = 0


# overlay is a floating layer that can be printed with stdout and moved around; useful for integrating chafa images; check docs in repo for example usage
[overlay]
# run a command and print stdout on the overlay layer
overlay_cmd = ""
# remove trailing lines from overlay_cmd output
overlay_trimmed_lines = 0
# set overlay size; 0 to be auto; 1 is one line, 2 two lines, etc; kitty & sixel image size can be determined automatically; others should be set mannually; try modify this whenever you meet issues releated to image height
overlay_height = 0
# move the overlay layer around for theming
move_overlay_right = 0
move_overlay_down = 0


# modules are defined as followed
[[modules]]
description = "google search"
prefix = "gg"
cmd = "xdg-open https://www.google.com/search?q='{}'"
# if with_argument is true, {} in cmd will be replaced with user input. if not explicitly set, taken as false.
with_argument = true
# url_encode should be true when calling webpages; this ensures special characters in url being readable to browsers; taken as false if not explicitly set
url_encode = true
# run cmd in a forked shell as opposed to as a child process (simply by prepending setsid -f to the configured cmd); useful for launching gui programs; taken as false if not explicitly set
unbind_proc = true

# fzf is needed to run below functions
[[modules]]
description = "desktop programs"
prefix = "app"
cmd = """
desktop_file() {
find /usr/share/applications -name "*.desktop" 2>/dev/null
find /usr/local/share/applications -name "*.desktop" 2>/dev/null
find "$HOME/.local/share/applications" -name "*.desktop" 2>/dev/null
find /var/lib/flatpak/exports/share/applications -name "*.desktop" 2>/dev/null
find "$HOME/.local/share/flatpak/exports/share/applications" -name "*.desktop" 2>/dev/null
}
selected="$(desktop_file | awk -F/ '{name=$NF; sub(/\\.desktop$/, "", name); print name}' | sort -k1,1 | cut -f2- | fzf --info-command 'echo -e " desktop apps ($FZF_POS/$FZF_TOTAL_COUNT)"' --cycle --gutter " " --pointer " ‚ĖĆ" --color "bg+:-1,pointer:1,info:8,separator:8,scrollbar:0" --prompt 'ÔćĚ  ' -m -d / --with-nth -1 )"
[ -z "$selected" ] && exit
echo "$selected" | while read -r line ; do setsid -f gtk-launch "$(basename $line)"; done
"""

[[modules]]
description = "power menu (fzf)"
prefix = "po"
cmd = """
function power {
if [[ -n $1 ]]; then
case $1 in
"logout") session=`loginctl session-status | head -n 1 | awk '{print $1}'`; loginctl terminate-session $session ;;
"suspend") systemctl suspend ;;
"hibernate") systemctl hibernate ;;
"reboot") systemctl reboot ;;
"shutdown") systemctl poweroff ;;
esac fi }
power $(echo -e 'reboot\nshutdown\nlogout\nsuspend\nhibernate' | fzf --info-command 'printf " power menu ($FZF_POS/$FZF_TOTAL_COUNT)"' --cycle --gutter " " --pointer " ‚ĖĆ" --color "bg+:-1,pointer:1,info:8,separator:8,scrollbar:0" --prompt 'ÔćĚ  ' | tail -1)
"""

[[modules]]
description = "run commands"
prefix = "sh"
cmd = """
$(printf $TERM | sed 's/xterm-//g') -e sh -c "{}"
"""
with_argument = true
unbind_proc = true

[[modules]]
description = "search archwiki"
prefix = "aw"
cmd = "xdg-open https://wiki.archlinux.org/index.php?search='{}'"
with_argument = true
url_encode = true
unbind_proc = true

[[modules]]
description = "search packages"
prefix = "pac"
cmd = "xdg-open https://archlinux.org/packages/?q='{}'"
with_argument = true
url_encode = true
unbind_proc = true

[[modules]]
description = "search the AUR"
prefix = "aur"
cmd = "xdg-open https://aur.archlinux.org/packages?K='{}'"
with_argument = true
url_encode = true
unbind_proc = true

[[modules]]
description = "cambridge dict"
prefix = "dc"
cmd = "xdg-open 'https://dictionary.cambridge.org/dictionary/english/{}'"
with_argument = true
url_encode = true
unbind_proc = true

[[modules]]
description = "open files (fzf)"
prefix = "fo"
cmd = """
find $HOME -type f -not -path '*/.cache/*' 2>/dev/null | fzf --info-command 'printf " files ($FZF_POS/$FZF_TOTAL_COUNT)"' --cycle --gutter ' ' --pointer ' ‚ĖĆ' --color 'bg+:-1,pointer:1,info:8,separator:8,scrollbar:0' --prompt 'ÔćĚ  ' | setsid -f xargs -r -I [] xdg-open '[]'
"""

[[modules]]
description = "open dirs (yazi)"
prefix = "yz"
cmd = """
find $HOME -type d -not -path '*/.cache/*' 2>/dev/null | fzf --info-command 'printf " directories ($FZF_POS/$FZF_TOTAL_COUNT)"' --cycle --gutter ' ' --pointer ' ‚ĖĆ' --color 'bg+:-1,pointer:1,info:8,separator:8,scrollbar:0' --prompt 'ÔćĚ  ' | xargs -r -I [] setsid -f "$(echo $TERM | sed 's/xterm-//g')" -e yazi '[]'
"""
